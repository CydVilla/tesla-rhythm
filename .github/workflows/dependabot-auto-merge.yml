name: Dependabot auto-merge

# Auto-merge Dependabot PRs for non-breaking (minor/patch) updates once CI passes.
# Major version bumps are intentionally skipped so a human reviews potential
# breaking changes.
#
# Requirements in repo settings (one-time, by a maintainer):
#   - Settings → General → "Allow auto-merge" must be enabled.
#   - A branch protection rule on `main` requiring the "Typecheck & build" check
#     is strongly recommended, so auto-merge waits for CI instead of merging
#     immediately. Without a required check, GitHub merges as soon as the PR is
#     mergeable.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve non-major updates
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for non-major updates
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        run: |
          gh pr comment "$PR_URL" --body \
            "This is a **major** version update (\`${{ steps.meta.outputs.dependency-names }}\` → ${{ steps.meta.outputs.new-version }}). Auto-merge is disabled for majors — please review for breaking changes before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
